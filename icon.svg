<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- 物語研究室のアイコン。案A「カード目録」の配色（生成り紙×墨×朱） -->
  <rect width="128" height="128" rx="18" fill="#f4eee1"/>
  <rect x="8" y="8" width="112" height="112" rx="12" fill="none" stroke="#3a3630" stroke-width="3"/>
  <!-- 索引カードの罫線 -->
  <line x1="22" y1="92" x2="106" y2="92" stroke="#c9bfa8" stroke-width="2"/>
  <line x1="22" y1="104" x2="88" y2="104" stroke="#c9bfa8" stroke-width="2"/>
  <!-- 朱印風の「物」 -->
  <rect x="30" y="22" width="68" height="58" rx="6" fill="#b23a2f"/>
  <text x="64" y="68" text-anchor="middle" font-family="'Hiragino Mincho ProN','Yu Mincho',serif"
        font-size="44" font-weight="bold" fill="#f4eee1">物</text>
</svg>
